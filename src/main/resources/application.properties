# ??? Serveur ??????????????????????????????????????????????????????????????????
server.port=8085

# ??? Base de données PostgreSQL ???????????????????????????????????????????????
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/africabank
spring.datasource.username=postgres
spring.datasource.password=diagaraf

# ??? Connection Pool (HikariCP ? inclus avec Spring Boot) ????????????????????
# Taille max du pool : adapter selon la charge prévue
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ??? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte PostgreSQL explicite (évite les warnings Hibernate 6+)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORRECTION : désactivé pour éviter les LazyInitializationException silencieuses
# et forcer une bonne gestion des transactions
spring.jpa.open-in-view=false

# ??? Séquence PostgreSQL (pour DossierNumberService) ?????????????????????????
# À exécuter une seule fois en base :
# CREATE SEQUENCE IF NOT EXISTS eer_sequence START 1 INCREMENT 1;

# ??? Upload de fichiers (pièces justificatives) ???????????????????????????????
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ??? Jackson ??????????????????????????????????????????????????????????????????
spring.jackson.serialization.fail-on-empty-beans=false

# Sérialisation des dates en ISO-8601 (LocalDate ? "2026-03-22")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ??? Logs ?????????????????????????????????????????????????????????????????????
logging.level.org.africa.bank=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE